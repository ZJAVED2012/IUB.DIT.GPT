
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IUB Smart IT Assistant | Directorate of IT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Noto+Nastaliq+Urdu:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
          --primary: #0ea5e9;
          --secondary: #64748b;
          --font-main: 'Plus Jakarta Sans', sans-serif;
          --bg-main: #020617;
          --bg-sidebar: #070b1d;
          --border: rgba(255, 255, 255, 0.05);
          --text-main: #f1f5f9;
          --text-muted: #94a3b8;
        }

        body { 
          font-family: var(--font-main); 
          background-color: var(--bg-main);
          color: var(--text-main);
          transition: background-color 0.3s, color 0.3s;
          -webkit-font-smoothing: antialiased;
        }
        
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* --- Professional Urdu Specific Styling --- */
        .urdu-text { 
          font-family: 'Noto Nastaliq Urdu', 'Urdu Typesetting', 'Jameel Noori Nastaleeq', serif; 
          line-height: 2.2; /* Critical for Nastaliq clarity */
          font-size: 1.25rem;
          direction: rtl;
          text-align: right;
          word-spacing: 2px;
          font-weight: 400;
        }

        /* Container for Urdu to ensure correct RTL layout */
        .rtl-container {
          direction: rtl;
          text-align: right;
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--primary);
            opacity: 0.1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            opacity: 0.3;
        }

        @keyframes scan {
          from { transform: translateY(-100%); }
          to { transform: translateY(100%); }
        }
        .animate-scan {
          animation: scan 2s linear infinite;
        }

        .theme-primary-text { color: var(--primary); }
        .theme-primary-bg { background-color: var(--primary); }
        .theme-primary-border { border-color: var(--primary); }
    </style>
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",

    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
